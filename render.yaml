services:
  - type: web
    name: matchiq-api
    env: python
    plan: free
    autoDeploy: true
    rootDir: matchiq/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: FOOTBALL_DATA_TOKEN
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9

name: Keep API warm

# Render's free tier spins the service down after 15 idle minutes, which
# makes the first visit wait ~50s for a cold start. Pinging /health every
# 10 minutes keeps it warm; one always-on service fits in the free plan's
# 750 instance-hours per month.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -sS -m 90 --retry 2 https://matchiq-api-1sye.onrender.com/health
